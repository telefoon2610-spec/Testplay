<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Firebase Login Test</title>
</head>
<body>

<h2>Login Test</h2>
<input type="email" id="email" placeholder="E-mail"><br>
<input type="password" id="password" placeholder="Wachtwoord"><br>
<button id="loginBtn">Login</button>
<div id="status">Niet ingelogd</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCiBTxLDiIy7LcF0kxJFt54OdgOfu9xHI8",
  authDomain: "scorebord-lm.firebaseapp.com",
  projectId: "scorebord-lm",
  storageBucket: "scorebord-lm.firebasestorage.app",
  messagingSenderId: "806422872262",
  appId: "1:806422872262:web:06e04d7aae8edb1d1e17c7"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

document.getElementById("loginBtn").onclick = () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  if(!email || !password) return alert("Vul e-mail en wachtwoord in");
  
  auth.signInWithEmailAndPassword(email, password)
    .then(userCredential => {
      document.getElementById("status").innerText = "Ingelogd als: " + userCredential.user.email;
    })
    .catch(err => {
      alert("Login fout: " + err.message);
    });
};

auth.onAuthStateChanged(user => {
  if(user) document.getElementById("status").innerText = "Ingelogd als: " + user.email;
  else document.getElementById("status").innerText = "Niet ingelogd";
});
</script>

</body>
</html>
