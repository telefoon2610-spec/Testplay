<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Player FIX</title>

<script src="https://unpkg.com/wavesurfer.js@6.6.4/dist/wavesurfer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b0f19;
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.box {
  width: 100%;
  max-width: 520px;
  background: rgba(20, 28, 48, 0.9);
  border-radius: 18px;
  padding: 18px;
}

#waveform {
  background: #0b1020;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #24304f;
  color: white;
  margin: 3px;
}

button.active {
  background: #2b6fff;
}

.track {
  padding: 10px;
  margin-top: 6px;
  background: #1f2a44;
  border-radius: 8px;
  cursor: pointer;
}

.track.active {
  background: #2b6fff;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎧 Wave Player</h2>

  <div id="waveform"></div>

  <!-- A/B LOOP KNOPPEN (TERUGGEZET) -->
  <button onclick="setA()" id="btnA">A</button>
  <button onclick="setB()" id="btnB">B</button>
  <button onclick="toggleLoop()" id="loopBtn">Loop OFF</button>
  <button onclick="togglePlay()" id="playBtn">▶ Play</button>

  <div id="list"></div>
</div>

<script>
const tracks = [
  { name: "Bailando la soca", file: "Bailando_la_soca.mp3" },
  { name: "Moving sounds", file: "Moving_sounds.mp3" },
  { name: "Smoothavana", file: "Smoothavana.mp3" },
  { name: "Walk like an Egyptian", file: "Walk_like_an_Egyptian.mp3" },
  { name: "Windows of the maloca", file: "Windows.mp3" },
];

let current = 0;
let loopA = null;
let loopB = null;
let loopOn = false;
let isPlaying = false;

// WaveSurfer
const wavesurfer = WaveSurfer.create({
  container: '#waveform',
  waveColor: '#3a4b70',
  progressColor: '#2b6fff',
  cursorColor: '#fff',
  height: 100
});

// playlist
const list = document.getElementById("list");

tracks.forEach((t, i) => {
  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.name;
  div.onclick = () => play(i);
  list.appendChild(div);
});

// PLAY TRACK
function play(i) {
  current = i;

  // reset loop
  loopA = null;
  loopB = null;
  loopOn = false;

  document.getElementById("loopBtn").innerText = "Loop OFF";
  document.getElementById("btnA").innerText = "A";
  document.getElementById("btnB").innerText = "B";

  updateUI();

  wavesurfer.stop();
  wavesurfer.empty();
  wavesurfer.load(tracks[i].file);
}

// PLAY / PAUSE
function togglePlay() {
  wavesurfer.playPause();
  isPlaying = !isPlaying;

  document.getElementById("playBtn").innerText =
    isPlaying ? "⏸ Pause" : "▶ Play";
}

// A
function setA() {
  loopA = wavesurfer.getCurrentTime();
  document.getElementById("btnA").innerText =
    "A " + format(loopA);
}

// B
function setB() {
  loopB = wavesurfer.getCurrentTime();
  document.getElementById("btnB").innerText =
    "B " + format(loopB);
}

// LOOP
function toggleLoop() {
  loopOn = !loopOn;
  document.getElementById("loopBtn").innerText =
    "Loop " + (loopOn ? "ON" : "OFF");
}

// FORMAT TIME
function format(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

// LOOP LOGIC
wavesurfer.on('audioprocess', () => {
  if (!loopOn || loopA === null || loopB === null) return;

  const t = wavesurfer.getCurrentTime();

  if (t >= loopB) {
    wavesurfer.setTime(loopA);
  }
});

// READY
wavesurfer.on('ready', () => {
  wavesurfer.play();
});

// NEXT TRACK
wavesurfer.on('finish', () => {
  if (loopOn && loopA !== null && loopB !== null) return;

  current = (current + 1) % tracks.length;
  play(current);
});

// UI
function updateUI() {
  document.querySelectorAll(".track").forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

// start
play(0);
</script>

</body>
</html>
