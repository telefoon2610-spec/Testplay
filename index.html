<script>
const tracks = [
  { name: "Bailando la soca", file: "Bailando_la_soca.mp3" },
  { name: "Moving sounds", file: "Moving_sounds.mp3" },
  { name: "Smoothavana", file: "Smoothavana.mp3" },
  { name: "Walk like an Egyptian", file: "Walk_like_an_Egyptian.mp3" },
  { name: "Windows", file: "Windows.mp3" },
];

let current = 0;
let loopA = null;
let loopB = null;
let loopOn = false;

let audioEl = null; // 🔥 BELANGRIJK

const wavesurfer = WaveSurfer.create({
  container: '#waveform',
  waveColor: '#3a4b70',
  progressColor: '#2b6fff',
  cursorColor: '#fff',
  height: 120
});

const list = document.getElementById("list");

tracks.forEach((t, i) => {
  const el = document.createElement("div");
  el.className = "track";
  el.innerText = t.name;
  el.onclick = () => play(i);
  list.appendChild(el);
});

function play(i) {
  current = i;

  loopA = null;
  loopB = null;
  loopOn = false;

  updateUI();

  wavesurfer.stop();

  setTimeout(() => {
    wavesurfer.empty();
    wavesurfer.load(tracks[i].file + "?v=" + Date.now());
  }, 80);
}

function togglePlay() {
  wavesurfer.playPause();
}

// ✅ NU WERKT HET ECHT
function setSpeed(val) {
  const rate = val / 100;

  if (audioEl) {
    audioEl.playbackRate = rate;

    audioEl.preservesPitch = true;
    audioEl.mozPreservesPitch = true;
    audioEl.webkitPreservesPitch = true;
  }

  document.getElementById("speedLabel").innerText = val + "%";
}

function setA() {
  loopA = wavesurfer.getCurrentTime();
}

function setB() {
  loopB = wavesurfer.getCurrentTime();
}

function toggleLoop() {
  loopOn = !loopOn;
}

wavesurfer.on('audioprocess', () => {
  if (!loopOn || loopA === null || loopB === null) return;

  const t = wavesurfer.getCurrentTime();

  if (t >= loopB) {
    wavesurfer.setTime(loopA);
  }
});

// 🔥 HIER pakken we de audio goed
wavesurfer.on('ready', () => {
  audioEl = wavesurfer.backend.media;

  // pitch fix direct zetten
  audioEl.preservesPitch = true;
  audioEl.mozPreservesPitch = true;
  audioEl.webkitPreservesPitch = true;

  wavesurfer.play();
});

function updateUI() {
  document.querySelectorAll(".track").forEach((t, i) => {
    t.classList.toggle("active", i === current);
  });
}

play(0);
</script>
