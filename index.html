<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Audio Player</title>

<script src="https://unpkg.com/wavesurfer.js@6.6.4/dist/wavesurfer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: radial-gradient(circle at top, #111a2e, #070a12);
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

/* APP */
.box {
  width: 100%;
  max-width: 520px;
  background: rgba(20, 28, 48, 0.9);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 5px;
}

small {
  display: block;
  text-align: center;
  opacity: 0.7;
  margin-bottom: 15px;
}

/* WAVE */
#waveform {
  background: #0b1020;
  border-radius: 14px;
  padding: 10px;
  margin-bottom: 15px;
}

/* BUTTONS */
button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: rgba(255,255,255,0.06);
  color: white;
  font-size: 13px;
  transition: 0.2s;
}

button:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}

button.active {
  background: #2b6fff;
  box-shadow: 0 0 20px rgba(43,110,255,0.4);
}

/* ROWS */
.row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

/* TRACKS */
.track {
  padding: 12px;
  margin-top: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.track:hover {
  background: rgba(255,255,255,0.08);
}

.track.active {
  background: #2b6fff;
  border-color: #2b6fff;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎧 Pro Audio Player</h2>
  <small>Waveform • A/B Loop • Playlist</small>

  <div id="waveform"></div>

  <!-- CONTROLS -->
  <div class="row">
    <button onclick="togglePlay()" id="playBtn">▶ Play</button>
  </div>

  <div class="row">
    <button onclick="setA()" id="btnA">A</button>
    <button onclick="setB()" id="btnB">B</button>
    <button onclick="toggleLoop()" id="loopBtn">Loop OFF</button>
  </div>

  <div id="list"></div>
</div>

<script>
const tracks = [
  { name: "Bailando la soca", file: "Bailando_la_soca.mp3" },
  { name: "Moving sounds", file: "Moving_sounds.mp3" },
  { name: "Smoothavana", file: "Smoothavana.mp3" },
  { name: "Walk like an Egyptian", file: "Walk_like_an_Egyptian.mp3" },
  { name: "Windows of the maloca", file: "Windows.mp3" },
];

let current = 0;
let loopA = null;
let loopB = null;
let loopOn = false;
let isPlaying = false;

// 🎧 WaveSurfer
const wavesurfer = WaveSurfer.create({
  container: '#waveform',
  waveColor: '#3a4b70',
  progressColor: '#2b6fff',
  cursorColor: '#fff',
  height: 100
});

// PLAYLIST
const list = document.getElementById("list");

tracks.forEach((t, i) => {
  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.name;
  div.onclick = () => play(i);
  list.appendChild(div);
});

// PLAY TRACK
function play(i) {
  current = i;

  loopA = null;
  loopB = null;
  loopOn = false;
  isPlaying = false;

  document.getElementById("loopBtn").innerText = "Loop OFF";
  document.getElementById("playBtn").innerText = "▶ Play";

  updateUI();

  wavesurfer.stop();
  wavesurfer.empty();
  wavesurfer.load(tracks[i].file);
}

// PLAY/PAUSE
function togglePlay() {
  wavesurfer.playPause();
  isPlaying = !isPlaying;

  document.getElementById("playBtn").innerText =
    isPlaying ? "⏸ Pause" : "▶ Play";
}

// A
function setA() {
  loopA = wavesurfer.getCurrentTime();
  document.getElementById("btnA").innerText =
    "A " + format(loopA);
}

// B
function setB() {
  loopB = wavesurfer.getCurrentTime();
  document.getElementById("btnB").innerText =
    "B " + format(loopB);
}

// LOOP
function toggleLoop() {
  loopOn = !loopOn;
  document.getElementById("loopBtn").innerText =
    "Loop " + (loopOn ? "ON" : "OFF");
}

// FORMAT TIME
function format(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

// LOOP LOGIC
wavesurfer.on('audioprocess', () => {
  if (!loopOn || loopA === null || loopB === null) return;

  const t = wavesurfer.getCurrentTime();

  if (t >= loopB) {
    wavesurfer.setTime(loopA);
  }
});

// AUTO PLAY
wavesurfer.on('ready', () => {
  wavesurfer.play();
  isPlaying = true;
  document.getElementById("playBtn").innerText = "⏸ Pause";
});

// NEXT TRACK
wavesurfer.on('finish', () => {
  if (loopOn && loopA !== null && loopB !== null) return;

  current = (current + 1) % tracks.length;
  play(current);
});

// START
play(0);
</script>

</body>
</html>
