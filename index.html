<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro MP3 Player</title>

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f19;
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:420px;
  background:#151c2e;
  padding:15px;
  border-radius:16px;
}

h2{text-align:center;}

.timebar{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  opacity:0.8;
  margin-bottom:6px;
}

.wave-wrap{
  position:relative;
  padding:10px 0;
}

#waveform{
  border-radius:10px;
  overflow:hidden;
}

#loopZone{
  position:absolute;
  top:0;
  height:80px;
  background:rgba(43,111,255,0.25);
  display:none;
  z-index:1;
}

#abMarkers .marker{
  position:absolute;
  transform:translateX(-50%);
  bottom:-5px;
  font-size:11px;
  padding:4px 6px;
  border-radius:6px;
  cursor:pointer;
  z-index:10;
}

#markA{background:#16a34a;}
#markB{background:#dc2626;}

.chapter-box{
  margin-top:12px;
  background:#1f2a44;
  border-radius:10px;
  padding:10px;
}

.chapter-title{
  font-size:13px;
  font-weight:700;
  margin-bottom:8px;
}

.chapter-list{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.chapter{
  background:#2b6fff;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  font-weight:700;
  transition:0.2s;
}

.chapter.active{
  background:#16a34a;
  transform:scale(1.1);
}

.controls-row{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.controls-row button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#24304f;
  color:white;
  cursor:pointer;
}

.speed{
  margin-top:12px;
}

.speed-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

#speedVal{
  width:70px;
  text-align:right;
}

.speed input{width:100%;}

.track{
  padding:10px;
  margin-top:6px;
  background:#1f2a44;
  border-radius:8px;
  cursor:pointer;
}

.track.active{
  background:#2b6fff;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎧 MP3 Player</h2>

  <div class="timebar">
    <div id="currentTime">0:00</div>
    <div id="totalTime">0:00</div>
  </div>

  <div class="wave-wrap">
    <div id="waveform"></div>
    <div id="loopZone"></div>

    <div id="abMarkers">
      <div id="markA" class="marker" style="display:none;">A</div>
      <div id="markB" class="marker" style="display:none;">B</div>
    </div>
  </div>

  <div class="chapter-box">
    <div class="chapter-title">Repetitie nummer/cijfer</div>
    <div id="chapters" class="chapter-list"></div>
  </div>

  <div class="controls-row">
    <button onclick="togglePlay()" id="playBtn">Play</button>
    <button onclick="setA()" id="btnA">A -</button>
    <button onclick="setB()" id="btnB">B -</button>
  </div>

  <div class="speed">
    <div class="speed-header">
      <span>Snelheid</span>
      <span id="speedVal">100%</span>
    </div>
    <input id="speedSlider" type="range" min="50" max="200" value="100"
      oninput="setSpeed(this.value)">
  </div>

  <div id="list"></div>
</div>

<script>
const tracks=[
  { name: "Bailando la soca", file: "Bailando.mp3" },
  { name: "Blinding Lights", file: "Blinding.mp3" },
  { name: "Moving sounds", file: "Moving.mp3",
    chapters: [
      {time:33,label:"19"},{time:52,label:"29"},{time:66,label:"37"},
      {time:110,label:"61"},{time:124,label:"69"},{time:135,label:"75"},
      {time:164,label:"91"},{time:186,label:"103"},{time:193,label:"107"},
      {time:214,label:"119"},{time:240,label:"127"},
    ]
  },
  { name: "Rush hour samba", file: "Rush.mp3",
    chapters: [
      {time:30,label:"C"},{time:62,label:"E"},{time:85,label:"F"},
      {time:103,label:"G"},{time:186,label:"Segno"},{time:234,label:"Coda"},
    ]
  },
  { name: "Shift", file: "Shift.mp3",
    chapters: [
      {time:32,label:"18"},{time:51,label:"36"},{time:78,label:"50"},
      {time:134,label:"89"},{time:149,label:"97"},{time:186,label:"116"},
    ]
  },
  { name: "Smoothavana", file: "Smoothavana.mp3",
    chapters: [
      {time:51,label:"25"},{time:89,label:"43"},{time:144,label:"67"},
      {time:162,label:"75"},{time:198,label:"91"},{time:268,label:"125"},
    ]
  },
  { name: "Trinity (snarky versie)", file: "Trinity.mp3",
    chapters: [
      {time:30,label:"B"},{time:95,label:"F"},{time:157,label:"G"},
      {time:182,label:"H"},{time:213,label:"J"},{time:258,label:"K"},
      {time:322,label:"L"},
    ]
  },
  { name: "Walk like an Egyptian", file: "Walk.mp3",
    chapters: [
      {time:58,label:"B"},{time:67,label:"C"},{time:93,label:"D"},
      {time:118,label:"E"},{time:128,label:"Segno"},{time:164,label:"Coda"},
    ]
  },
  { name: "Windows of the maloca", file: "Windows.mp3",
    chapters: [
      {time:32,label:"A"},{time:48,label:"B"},{time:80,label:"C"},
      {time:130,label:"D"},{time:162,label:"E"},{time:210,label:"F"},
      {time:235,label:"G"},{time:260,label:"H"},{time:276,label:"I"},
      {time:292,label:"J"},
    ]
  },
];

let current=0;
let loopA=null, loopB=null;
let chapterElements=[];

const wavesurfer=WaveSurfer.create({
  container:"#waveform",
  waveColor:"#4f7cff",
  progressColor:"#2b6fff",
  height:80,
  normalize:true
});

/* playlist */
const list=document.getElementById("list");

tracks.forEach((t,i)=>{
  const div=document.createElement("div");
  div.className="track";
  div.innerText=t.name;
  div.onclick=()=>loadTrack(i);
  list.appendChild(div);
});

function updatePlaylist(){
  document.querySelectorAll(".track").forEach((el,i)=>{
    el.classList.toggle("active",i===current);
  });
}

/* chapters */
function renderChapters(){
  const container=document.getElementById("chapters");
  container.innerHTML="";
  chapterElements=[];

  const chapters = tracks[current].chapters || [];

  if(chapters.length === 0){
    container.innerHTML="<div style='opacity:0.5'>-</div>";
    return;
  }

  chapters.forEach(ch=>{
    const el=document.createElement("div");
    el.className="chapter";
    el.innerText=ch.label;
    el.onclick=()=>wavesurfer.setTime(ch.time);

    container.appendChild(el);
    chapterElements.push(el);
  });
}

function updateActiveChapter(time){
  const chapters = tracks[current].chapters || [];
  let activeIndex = -1;

  for(let i=0;i<chapters.length;i++){
    if(time >= chapters[i].time){
      activeIndex = i;
    } else break;
  }

  chapterElements.forEach((el,i)=>{
    el.classList.toggle("active", i===activeIndex);
  });
}

/* LOOP FUNCTIES */
function resetLoop(){
  loopA=null;
  loopB=null;

  markA.style.display="none";
  markB.style.display="none";
  loopZone.style.display="none";

  updateButtons();
  updateVisuals();
}

function updateButtons(){
  btnA.innerText = "A " + (loopA ? format(loopA) : "-");
  btnB.innerText = "B " + (loopB ? format(loopB) : "-");
}

function updateVisuals(){
  const dur = wavesurfer.getDuration();
  if(!dur) return;

  let a = loopA;
  let b = loopB;

  if(a && b && a > b) [a,b] = [b,a];

  if(a != null){
    markA.style.display="block";
    markA.style.left=(a/dur*100)+"%";
  } else markA.style.display="none";

  if(b != null){
    markB.style.display="block";
    markB.style.left=(b/dur*100)+"%";
  } else markB.style.display="none";

  if(a != null && b != null){
    loopZone.style.display="block";
    loopZone.style.left=(a/dur*100)+"%";
    loopZone.style.width=((b-a)/dur*100)+"%";
  } else {
    loopZone.style.display="none";
  }
}

function setA(){
  loopA = (loopA !== null) ? null : wavesurfer.getCurrentTime();
  updateButtons();
  updateVisuals();
}

function setB(){
  loopB = (loopB !== null) ? null : wavesurfer.getCurrentTime();
  updateButtons();
  updateVisuals();
}

/* load */
function loadTrack(i){
  current=i;
  wavesurfer.load(tracks[i].file);

  updatePlaylist();

  setSpeed(100);
  document.getElementById("speedSlider").value = 100;

  resetLoop();

  wavesurfer.once("ready",()=>{
    wavesurfer.play();
    playBtn.innerText="Pause";
    totalTime.innerText=format(wavesurfer.getDuration());
    renderChapters();
  });
}

function togglePlay(){
  wavesurfer.playPause();
  playBtn.innerText = wavesurfer.isPlaying() ? "Pause" : "Play";
}

function setSpeed(val){
  wavesurfer.setPlaybackRate(val/100);
  speedVal.innerText = val + "%";
}

wavesurfer.on("audioprocess",()=>{
  const time = wavesurfer.getCurrentTime();
  currentTime.innerText = format(time);

  updateActiveChapter(time);

  if(loopA!=null && loopB!=null){
    let a = loopA, b = loopB;
    if(a > b) [a,b] = [b,a];

    if(time >= b){
      wavesurfer.setTime(a);
    }
  }
});

function format(t){
  const m=Math.floor(t/60);
  const s=Math.floor(t%60);
  return m+":"+s.toString().padStart(2,'0');
}

/* init */
loadTrack(0);
</script>

</body>
</html>
