<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waveform Player FIX PRO</title>

<script src="https://unpkg.com/wavesurfer.js@6.6.4/dist/wavesurfer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #0b0f19;
  color: white;
  display: flex;
  justify-content: center;
  padding: 20px;
}

.box {
  width: 100%;
  max-width: 450px;
  background: #151c2e;
  padding: 15px;
  border-radius: 16px;
}

#waveform {
  background: #0f1525;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
}

button {
  padding: 8px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #24304f;
  color: white;
  margin: 3px;
}

button.active {
  background: #2b6fff;
}

.track {
  padding: 10px;
  margin-top: 6px;
  background: #1f2a44;
  border-radius: 8px;
  cursor: pointer;
}
.track.active { background: #2b6fff; }
</style>
</head>

<body>

<div class="box">
  <h2>🎧 Waveform Player</h2>

  <div id="waveform"></div>

  <!-- CONTROLS -->
  <button onclick="togglePlay()" id="playBtn">▶ Play</button>
  <button onclick="setA()">A</button>
  <button onclick="setB()">B</button>
  <button onclick="toggleLoop()" id="loopBtn">Loop OFF</button>

  <div id="list"></div>
</div>

<script>
const tracks = [
  { name: "Bailando la soca", file: "Bailando_la_soca.mp3" },
  { name: "Moving sounds", file: "Moving_sounds.mp3" },
  { name: "Smoothavana", file: "Smoothavana.mp3" },
  { name: "Walk like an Egyptian", file: "Walk _like_an_Egyptian.mp3" },
  { name: "Windows of the Maloca", file: "Windows.mp3" },
];

let current = 0;
let loopA = null;
let loopB = null;
let loopOn = false;
let isPlaying = false;

// 🎧 WaveSurfer
const wavesurfer = WaveSurfer.create({
  container: '#waveform',
  waveColor: '#3a4b70',
  progressColor: '#2b6fff',
  cursorColor: '#fff',
  height: 90
});

// 🎵 playlist
const list = document.getElementById("list");

tracks.forEach((t, i) => {
  const div = document.createElement("div");
  div.className = "track";
  div.innerText = t.name;
  div.onclick = () => play(i);
  list.appendChild(div);
});

// 🔥 LOAD TRACK (FIXED)
function play(i) {
  current = i;

  loopA = null;
  loopB = null;
  loopOn = false;
  isPlaying = false;

  document.getElementById("loopBtn").innerText = "Loop OFF";
  document.getElementById("playBtn").innerText = "▶ Play";

  updateUI();

  wavesurfer.stop();
  wavesurfer.empty();
  wavesurfer.load(tracks[i].file);
}

// ▶ PLAY / PAUSE
function togglePlay() {
  if (!wavesurfer.getDuration()) return;

  wavesurfer.playPause();
  isPlaying = !isPlaying;

  document.getElementById("playBtn").innerText =
    isPlaying ? "⏸ Pause" : "▶ Play";
}

// A
function setA() {
  loopA = wavesurfer.getCurrentTime();
}

// B
function setB() {
  loopB = wavesurfer.getCurrentTime();
}

// LOOP
function toggleLoop() {
  loopOn = !loopOn;
  document.getElementById("loopBtn").innerText =
    "Loop " + (loopOn ? "ON" : "OFF");
}

// UI
function updateUI() {
  document.querySelectorAll(".track").forEach((el, i) => {
    el.classList.toggle("active", i === current);
  });
}

// 🔁 LOOP LOGIC
wavesurfer.on('audioprocess', () => {
  if (!loopOn || loopA === null || loopB === null) return;

  const t = wavesurfer.getCurrentTime();

  if (t >= loopB) {
    wavesurfer.setTime(loopA);
  }
});

// ▶ AUTO PLAY when ready
wavesurfer.on('ready', () => {
  wavesurfer.play();
  isPlaying = true;
  document.getElementById("playBtn").innerText = "⏸ Pause";
});

// ⏭ NEXT TRACK
wavesurfer.on('finish', () => {
  if (loopOn && loopA !== null && loopB !== null) return;

  current = (current + 1) % tracks.length;
  play(current);
});

// START
play(0);
</script>

</body>
</html>
