<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro MP3 Player</title>

<script src="https://unpkg.com/wavesurfer.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f19;
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:420px;
  background:#151c2e;
  padding:15px;
  border-radius:16px;
}

h2{text-align:center;}

.timebar{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  opacity:0.8;
  margin-bottom:6px;
}

/* waveform */
.wave-wrap{
  position:relative;
  padding:10px 0;
}

#waveform{
  border-radius:10px;
  overflow:hidden;
}

/* A/B markers */
#abMarkers .marker{
  position:absolute;
  transform:translateX(-50%);
  bottom:-5px;
  font-size:11px;
  padding:4px 6px;
  border-radius:6px;
  cursor:pointer;
  z-index:10;
  text-align:center;
}

#markA{background:#16a34a;}
#markB{background:#dc2626;}

.marker::after{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:2px;
  height:70px;
  background:rgba(255,255,255,0.2);
  top:-70px;
}

/* CHAPTER BOX (NIEUW) */
.chapter-box{
  margin-top:12px;
  background:#1f2a44;
  border-radius:10px;
  padding:10px;
}

.chapter-title{
  font-size:13px;
  font-weight:700;
  margin-bottom:8px;
  opacity:0.9;
}

.chapter-list{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.chapter{
  background:#2b6fff;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  user-select:none;
}

.chapter:hover{
  background:#3b7bff;
}

/* controls */
.controls-row{
  display:flex;
  gap:6px;
  margin-top:10px;
}

.controls-row button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#24304f;
  color:white;
  cursor:pointer;
}

.speed{
  margin-top:12px;
}

.speed-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

#speedVal{
  width:70px;
  text-align:right;
}

.speed input{width:100%;}

.track{
  padding:10px;
  margin-top:6px;
  background:#1f2a44;
  border-radius:8px;
  cursor:pointer;
}

.track.active{
  background:#2b6fff;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎧 Pro MP3 Player</h2>

  <div class="timebar">
    <div id="currentTime">0:00</div>
    <div id="totalTime">0:00</div>
  </div>

  <div class="wave-wrap">
    <div id="waveform"></div>

    <div id="abMarkers">
      <div id="markA" class="marker" style="display:none;">A</div>
      <div id="markB" class="marker" style="display:none;">B</div>
    </div>
  </div>

  <!-- NIEUW VAK -->
  <div class="chapter-box">
    <div class="chapter-title">Repetitie nummer/cijfer</div>
    <div id="chapters" class="chapter-list"></div>
  </div>

  <div class="controls-row">
    <button onclick="togglePlay()" id="playBtn">Play</button>
    <button onclick="setA()" id="btnA">A -</button>
    <button onclick="setB()" id="btnB">B -</button>
  </div>

  <div class="speed">
    <div class="speed-header">
      <span>Snelheid</span>
      <span id="speedVal">100%</span>
    </div>
    <input type="range" min="50" max="200" value="100" oninput="setSpeed(this.value)">
  </div>

  <div id="list"></div>
</div>

<script>
const tracks=[
  {
    name:"Bailando la soca",
    file:"Bailando.mp3",
    chapters:[
      {time:63,label:"A"},
      {time:120,label:"19"}
    ]
  },
  {
    name:"Blinding Lights",
    file:"Blinding.mp3",
    chapters:[
      {time:30,label:"Intro"},
      {time:75,label:"Drop"}
    ]
  }
];

let current=0;
let loopA=null, loopB=null;

const wavesurfer=WaveSurfer.create({
  container:"#waveform",
  waveColor:"#4f7cff",
  progressColor:"#2b6fff",
  height:80,
  normalize:true
});

/* playlist */
const list=document.getElementById("list");

tracks.forEach((t,i)=>{
  const div=document.createElement("div");
  div.className="track";
  div.innerText=t.name;
  div.onclick=()=>loadTrack(i);
  list.appendChild(div);
});

function updatePlaylist(){
  document.querySelectorAll(".track").forEach((el,i)=>{
    el.classList.toggle("active",i===current);
  });
}

/* CHAPTERS (NIEUW VAK) */
function renderChapters(){
  const container=document.getElementById("chapters");
  container.innerHTML="";

  const dur=wavesurfer.getDuration();
  const chapters=tracks[current].chapters;

  if(!dur || !chapters) return;

  chapters.forEach(ch=>{
    const el=document.createElement("div");
    el.className="chapter";
    el.innerText=ch.label;

    el.onclick=()=>{
      wavesurfer.setTime(ch.time);
    };

    container.appendChild(el);
  });
}

/* load */
function loadTrack(i){
  current=i;
  wavesurfer.load(tracks[i].file);

  resetLoop();
  updatePlaylist();

  wavesurfer.once("ready",()=>{
    wavesurfer.play();
    playBtn.innerText="Pause";

    totalTime.innerText=format(wavesurfer.getDuration());
    renderChapters();
  });
}

function resetLoop(){
  loopA=null;
  loopB=null;
  markA.style.display="none";
  markB.style.display="none";
}

/* play */
function togglePlay(){
  wavesurfer.playPause();
  playBtn.innerText=wavesurfer.isPlaying()?"Pause":"Play";
}

/* speed */
function setSpeed(val){
  wavesurfer.setPlaybackRate(val/100);
  speedVal.innerText=val+"%";
}

function format(t){
  const m=Math.floor(t/60);
  const s=Math.floor(t%60);
  return m+":"+s.toString().padStart(2,'0');
}

wavesurfer.on("audioprocess",()=>{
  currentTime.innerText=format(wavesurfer.getCurrentTime());
});

loadTrack(0);
</script>

</body>
</html>
